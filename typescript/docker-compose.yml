version: '3.7'

services:
  db:
    container_name: school-administration-system-mysql
    image: mysql:8.4
    command: --mysql-native-password=ON
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: school-administration-system
    ports:
      - "33306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  external:
    container_name: school-administration-system-external
    build:
      context: ../external
      dockerfile: external-system.Dockerfile
    image: school-administration-system-external:1.0
    environment:
      TZ: Asia/Singapore
      NODE_ENV: production
    ports:
      - "5000:5000"

  application:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      external:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PW: password
      DB_SCHEMA: school-administration-system
      PORT: 3000
      EXTERNAL_BASE_URL: http://external:5000

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - "8000:8000"
    depends_on:
      - application
